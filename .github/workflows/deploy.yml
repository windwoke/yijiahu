# =============================================
# 一家护 - 生产部署 Workflow
# 触发：push 到 main 分支
# =============================================

name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: '跳过数据库迁移'
        required: false
        default: 'false'

jobs:
  # ─── 1. 构建后端（NestJS）────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Lint
        run: npm run lint || true
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 1

  # ─── 2. 构建 Flutter App ─────────────────
  build-flutter:
    name: Build Flutter App
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: 'stable'

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get dependencies
        run: flutter pub get
        working-directory: lib

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true
        working-directory: lib

      - name: Build iOS (Simulator)
        run: flutter build ios --simulator --no-codesign
        working-directory: lib

      - name: Build Android APK
        run: flutter build apk --debug
        working-directory: lib

      - name: Upload Flutter artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build
          path: |
            lib/build/ios/iphonesimulator/Runner.app
            lib/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 3

  # ─── 3. 部署到服务器 ──────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-backend
    environment:
      name: production
      url: https://api.yijiahu.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
        run: |
          echo "打包代码..."
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='dist' \
              --exclude='.env*' \
              -czf /tmp/yijiahu-backend.tar.gz .

          echo "上传到服务器..."
          scp -o StrictHostKeyChecking=no \
              /tmp/yijiahu-backend.tar.gz \
              $SERVER_USER@$SERVER_HOST:/tmp/

          echo "在服务器执行部署..."
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << 'REMOTE'
            set -e
            APP_DIR="/opt/yijiahu/yijiahu"
            BACKUP_DIR="/opt/yijiahu/yijiahu_backup_$(date +%Y%m%d_%H%M%S)"
            ENV_FILE="$APP_DIR/.env.prod"

            # 备份当前版本
            if [ -d "$APP_DIR/backend/dist" ]; then
              cp -r "$APP_DIR/backend/dist" "$BACKUP_DIR/dist" 2>/dev/null || true
            fi

            # 解压新版本（tarball 包含 repo root，直接解压到 APP_DIR）
            mkdir -p "$APP_DIR"
            tar -xzf /tmp/yijiahu-backend.tar.gz -C "$APP_DIR/"

            cd "$APP_DIR/backend"

            # 安装依赖（生产）
            npm ci

            # 构建（TypeORM 不需要迁移，synchronize 已关闭）
            npm run build

            # 重启服务
            systemctl restart yijiahu
            sleep 3

            if systemctl is-active --quiet yijiahu; then
              echo "部署成功！版本: $(git log -1 --oneline)"
              echo "API 健康检查: $(curl -s -o /dev/null -w '%{http_code}' http://localhost/v1/auth/me || echo 'FAIL')"
            else
              echo "部署失败，回滚中..."
              if [ -d "$BACKUP_DIR/dist" ]; then
                cp -r "$BACKUP_DIR/dist" "$APP_DIR/backend/dist/"
                systemctl restart yijiahu
                echo "已回滚到上一版本"
              fi
              exit 1
            fi
          REMOTE

      - name: Health Check
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer test" \
            http://${{ secrets.PRODUCTION_DOMAIN }}/v1/auth/me || echo "000")
          echo "Health check HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
            echo "API 服务正常"
          else
            echo "API 服务异常，请检查！"
            exit 1
          fi
