# =============================================
# 一家护 - 生产部署 Workflow
# 触发：push 到 main 分支
# =============================================

name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: '跳过数据库迁移'
        required: false
        default: 'false'

jobs:
  # ─── 0. 检测 Flutter 代码变化 ─────────────────
  flutter-changes:
    name: Detect Flutter Changes
    runs-on: ubuntu-latest
    outputs:
      flutter: ${{ steps.filter.outputs.flutter }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            flutter: |
              lib/**
              android/**
              ios/**
              pubspec.yaml
              pubspec.lock

  # ─── 1. 构建后端（NestJS）────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Lint
        run: npm run lint || true
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 1

  # ─── 2. 构建 Flutter App（仅 Flutter 代码变化时）────────────────
  build-flutter:
    name: Build Flutter App
    runs-on: macos-14
    needs: flutter-changes
    if: needs.flutter-changes.outputs.flutter == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: 'stable'

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Get dependencies
        run: flutter pub get
        working-directory: lib

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true
        working-directory: lib

      - name: Build iOS (Simulator)
        env:
          OSS_BASE_URL: ${{ secrets.OSS_BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          flutter build ios --simulator --no-codesign \
            --dart-define=OSS_BASE_URL="$OSS_BASE_URL" \
            --dart-define=API_BASE_URL="$API_BASE_URL"
        working-directory: lib

      - name: Build Android APK
        env:
          OSS_BASE_URL: ${{ secrets.OSS_BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          flutter build apk --debug \
            --dart-define=OSS_BASE_URL="$OSS_BASE_URL" \
            --dart-define=API_BASE_URL="$API_BASE_URL"
        working-directory: lib

      - name: Upload Flutter artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build
          path: |
            lib/build/ios/iphonesimulator/Runner.app
            lib/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 3

  # ─── 3. 部署到服务器 ──────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-backend
    environment:
      name: production
      url: https://api.yijiahu.com
    env:
      SKIP_MIGRATE: ${{ github.event.inputs.skip_migrate }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
          OSS_KEY: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
        run: |
          echo "打包代码（包含预编译的 dist）..."
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='.env*' \
              -czf /tmp/yijiahu-backend.tar.gz .

          echo "上传到服务器..."
          scp -o StrictHostKeyChecking=no \
              /tmp/yijiahu-backend.tar.gz \
              $SERVER_USER@$SERVER_HOST:/tmp/

          echo "在服务器执行部署..."
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST bash -ec '
            set -e
            APP_DIR="/opt/yijiahu/yijiahu"
            BACKUP_DIR="/opt/yijiahu/yijiahu_backup_$(date +%Y%m%d_%H%M%S)"
            ENV_FILE="$APP_DIR/backend/.env.prod"

            # 备份 dist（如果存在）
            if [ -d "$APP_DIR/backend/dist" ]; then
              mkdir -p "$BACKUP_DIR"
              cp -r "$APP_DIR/backend/dist" "$BACKUP_DIR/" 2>/dev/null || true
            fi

            # 解压新版本（tarball 包含 repo root + dist，.env* 被排除不打包）
            mkdir -p "$APP_DIR"
            tar -xzf /tmp/yijiahu-backend.tar.gz -C "$APP_DIR/"

            # 更新 OSS 凭证到 backend/.env.prod（不覆盖 DB 等原有配置）
            if [ -n "$OSS_KEY" ]; then
              for var in ALIYUN_ACCESS_KEY_ID ALIYUN_ACCESS_KEY_SECRET ALIYUN_OSS_ENDPOINT ALIYUN_OSS_BUCKET; do
                sed -i "/^${var}=/d" "$ENV_FILE" 2>/dev/null || true
              done
              {
                echo ""
                echo "# Aliyun OSS"
                echo "ALIYUN_ACCESS_KEY_ID=$OSS_KEY"
                echo "ALIYUN_ACCESS_KEY_SECRET=$OSS_SECRET"
                echo "ALIYUN_OSS_ENDPOINT=$OSS_ENDPOINT"
                echo "ALIYUN_OSS_BUCKET=$OSS_BUCKET"
              } >> "$ENV_FILE"
              echo "OSS 凭证已更新"
            fi

            # 安装依赖（跳过 build，dist 已预编译）
            cd "$APP_DIR/backend"
            npm ci 2>&1 | tail -3

            # ─── 数据库迁移 ───────────────────────
            if [ "$SKIP_MIGRATE" != "true" ]; then
              echo "执行数据库迁移..."
              set -a && . "$ENV_FILE" && set +a
              PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -p "${DB_PORT:-5432}" -U "$DB_USERNAME" -d "$DB_NAME" -f migrations/012_add_care_log_attachments_familyid.sql 2>&1 || echo "迁移完成或已有数据"
              PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -p "${DB_PORT:-5432}" -U "$DB_USERNAME" -d "$DB_NAME" -f migrations/013_add_wechat_bindings.sql 2>&1 || echo "迁移完成或已有数据"
              PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -p "${DB_PORT:-5432}" -U "$DB_USERNAME" -d "$DB_NAME" -f migrations/014_add_wechat_notification_pref.sql 2>&1 || echo "迁移完成或已有数据"
            else
              echo "跳过数据库迁移（skip_migrate=true）"
            fi

            # 检查并修复 systemd 服务文件
            SYSTEMD_FILE="/etc/systemd/system/yijiahu.service"
            if [ ! -f "$SYSTEMD_FILE" ]; then
              printf "%s\n" "[Unit]" "Description=Yijiahu Backend API" "After=network.target" "" \
                "[Service]" "Type=simple" "User=root" \
                "WorkingDirectory=/opt/yijiahu/yijiahu/backend" \
                "EnvironmentFile=/opt/yijiahu/yijiahu/backend/.env.prod" \
                "ExecStart=/usr/bin/node dist/main.js" \
                "Restart=always" "RestartSec=10" "" \
                "[Install]" "WantedBy=multi-user.target" > "$SYSTEMD_FILE"
              sed -i "s|EnvironmentFile=/opt/yijiahu/yijiahu/.env.prod|EnvironmentFile=/opt/yijiahu/yijiahu/backend/.env.prod|" "$SYSTEMD_FILE" 2>/dev/null || true
              systemctl daemon-reload
              echo "systemd 服务文件已创建"
            else
              if ! grep -q "EnvironmentFile" "$SYSTEMD_FILE"; then
                sed -i "/ExecStart=/a EnvironmentFile=$ENV_FILE" "$SYSTEMD_FILE"
                sed -i "s|EnvironmentFile=/opt/yijiahu/yijiahu/.env.prod|EnvironmentFile=$ENV_FILE|" "$SYSTEMD_FILE" 2>/dev/null || true
                systemctl daemon-reload
              fi
            fi

            # 停止现有服务，source env后直接测试
            systemctl stop yijiahu 2>/dev/null || true
            sleep 2
            set -a && . "$ENV_FILE" && set +a && timeout 8 node dist/main.js 2>&1 || echo "启动测试完成"

            # 重新启动服务
            systemctl start yijiahu 2>&1
            sleep 5

            if systemctl is-active --quiet yijiahu; then
              echo "部署成功！版本: $(git log -1 --oneline)"
              echo "API 健康检查: $(curl -s -o /dev/null -w '"'"'%{http_code}'"'"' http://localhost/v1/users/me || echo FAIL)"
            else
              echo "=== systemd 服务状态 ==="
              systemctl status yijiahu --no-pager -l || true
              echo "=== journalctl 应用日志 ==="
              journalctl -u yijiahu --no-pager -n 50 --since "-1 minute" || true
              echo "=== 回滚中 ==="
              if [ -d "$BACKUP_DIR/dist" ]; then
                cp -r "$BACKUP_DIR/dist" "$APP_DIR/backend/dist/"
                systemctl restart yijiahu 2>&1
                echo "已回滚到上一版本"
              fi
              exit 1
            fi
          '

      - name: Health Check
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer test" \
            http://${{ secrets.PRODUCTION_DOMAIN }}/v1/users/me || echo "000")
          echo "Health check HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
            echo "API 服务正常"
          else
            echo "API 服务异常，请检查！"
            exit 1
          fi
